version: 1
applications:
  - frontend:
      phases:
        preBuild:
          commands:
            - cd noor-portal-client
            - npm install
        build:
          commands:
            - npm run build
      artifacts:
        baseDirectory: noor-portal-client/build
        files:
          - '**/*'
      cache:
        paths:
          - noor-portal-client/node_modules/**/*
          